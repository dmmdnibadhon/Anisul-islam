<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    
</head>
<body>
    <div>
        <label for="fullname">Full Name:</label>
        <input type="text" name="fullname" id="fullname">
    </div><br>
    <div>
        <label for="email">Email:</label>
        <input type="email" name="email" id="email">
    </div><br>
    <div>
        <label for="pasword">Password:</label>
        <input type="password" name="password" id="password">
    </div><br>
    <div>
        <label for="dob">Date of Birth:</label>
        <input type="date" name="dob id="dob">
    </div><br>
    <div>
        <label for="photo">File:</label>
        <input type="file" name="photo" id="photo">
    </div><br>
    <div>
        <label for="gender"></label>
        <input type="radion" name="gender" id="gender">
    </div><br>
    <div>
        <label for="religion">Religion</label>
        <input checked type="checkbox" name="muslim" id="muslim" value="muslim">Muslim
        <input type="checkbox" name="hindu" id="hindu" value="hindu">Hindu
    </div><br>
    <div>
    <label for="department">Department:</label>
    <section name="department">
        <option value="cse">CSE</option>
        <option value="eee">EEE</option>
        <option value="llb">LLB</option>
    </section>
    </div><br>
    <div>
        <label for="textarea">Text area</label><br>
        <textarea name="text" id="text" cols="30" rows="10"></textarea>
    </div><br>
    <div>
        <button>Submit</button>
        <button>Cancel</button>
    </div>
</body>
</html>
